<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VLL — Launcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="popup-header">
    <div class="popup-logo">
      <span class="popup-logo-icon">✦</span>
      <span class="popup-logo-text">VLL</span>
      <span class="popup-logo-sub">Launcher</span>
    </div>
  </header>

  <section class="popup-section popup-toggle-section">
    <label class="popup-toggle-label" for="toggle-enabled">
      <span>Ativar extensão</span>
      <input type="checkbox" id="toggle-enabled" checked>
      <span class="popup-toggle-slider"></span>
    </label>
  </section>

  <section class="popup-section popup-status-section">
    <p class="popup-section-title">Status das legendas</p>
    <div class="popup-subtitle-status" id="popup-subtitle-status">Aguardando estado das legendas...</div>
  </section>

  <section class="popup-section popup-actions-section">
    <button class="popup-btn popup-btn-primary" id="btn-sidepanel" title="Abrir Painel Lateral">
      Abrir painel lateral
    </button>
    <p class="popup-hint">Gerencie vocabulário e ajustes no painel lateral.</p>
  </section>

  <script src="logger.shared.js"></script>
  <script src="messages.shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
